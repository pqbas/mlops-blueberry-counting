name: blueberry_line_yolov9s_aug # line_crossing con yolov9s re-entrenado con augmentations agresivas
type: evaluate
strategy: line_crossing
runtime: modal
device: gpu
render: false
dataset: data/blueberry-counting/manifest.yaml

model:
  detector_weights: models/yolov9s_aug_blueberry.pt

# --- params para strategy: line_crossing ---
params:
  count_mode: horizontal
  threshold: 0.5
  direction: left2right
  conf_threshold: 0.15
  crop: center_square
