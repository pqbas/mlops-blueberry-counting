name: blueberry_line_yolo26 # line_crossing sobre los 4 detectores yolo26 blueberry
type: evaluate
strategy: line_crossing
runtime: modal
device: gpu
render: false
dataset: data/blueberry-counting/manifest.yaml

model:
  detector_weights: models/yolo26n_blueberry.pt, models/yolo26s_blueberry.pt, models/yolo26m_blueberry.pt, models/yolo26l_blueberry.pt

# --- params para strategy: line_crossing ---
params:
  count_mode: horizontal
  threshold: 0.5
  direction: left2right
  conf_threshold: 0.15
  crop: center_square
