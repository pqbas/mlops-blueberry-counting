name: blueberry_tiled_yolo26 # tiled_crossing sobre los 4 detectores yolo26 blueberry
type: evaluate
strategy: tiled_crossing
runtime: modal
device: gpu
render: false
dataset: data/blueberry-counting/manifest.yaml

model:
  detector_weights: models/yolo26n_blueberry.pt, models/yolo26s_blueberry.pt, models/yolo26m_blueberry.pt, models/yolo26l_blueberry.pt

# --- params para strategy: tiled_crossing ---
params:
  direction: left2right
  conf_threshold: 0.15
