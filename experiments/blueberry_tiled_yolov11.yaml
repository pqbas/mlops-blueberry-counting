name: blueberry_tiled_yolov11 # tiled_crossing sobre los 4 detectores yolov11 blueberry
type: evaluate
strategy: tiled_crossing
runtime: modal
device: gpu
render: false
dataset: data/blueberry-counting/manifest.yaml

model:
  detector_weights: models/yolov11n_blueberry.pt, models/yolov11s_blueberry.pt, models/yolov11m_blueberry.pt, models/yolov11l_blueberry.pt

# --- params para strategy: tiled_crossing ---
params:
  direction: left2right
  conf_threshold: 0.15
